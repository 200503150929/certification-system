spring:
  datasource:
    url: jdbc:mysql://localhost:3306/certification_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

  # ========== Redis 配置 ==========
  data:
    redis:
      # Redis 服务器地址
      host: localhost
      # Redis 服务器端口
      port: 6379
      # Redis 密码（如果没有密码，留空或注释掉）
      password:
      # 连接超时时间（毫秒）
      timeout: 5000ms
      # Lettuce 连接池配置
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0
          # 从连接池获取连接的最大等待时间
          max-wait: -1ms

server:
  port: 8081
  servlet:
    context-path: /api

jwt:
  secret: certification-system-secret-key-2026-eeas-jwt-hs256
  expiration: 86400000

# ========== 日志配置（可选） ==========
logging:
  level:
    com.certification.backend: debug
    org.springframework.data.redis: debug