spring:
  datasource:
    url: jdbc:mysql://localhost:3306/certification_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 50MB          # 单个文件最大 50MB
      max-request-size: 60MB       # 单次请求最大 60MB（含所有文件）

server:
  port: 8081
  servlet:
    context-path: /api

jwt:
  secret: certification-system-secret-key-2026-eeas-jwt-hs256
  expiration: 86400000